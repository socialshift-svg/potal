<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialShift 1on1管理システム｜ログイン</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7faf9;--bg2:#ffffff;--bg3:#f0f6f5;--bg4:#e8f2f0;
  --bd:#d4e5e2;--bd2:#b8d4cf;
  --tx:#2c3e3a;--tx2:#5a6e68;--tx3:#8fa39d;
  --pr:#5dafa7;--pr2:#4a9890;--pr-light:#e8f5f4;
  --gr:#52c997;--gr-light:#e6f9f2;
  --am:#e8a852;--am-light:#fef5e6;
  --rd:#e87171;--rd-light:#fef2f2;
  --r:14px;--sh:0 2px 12px rgba(93,175,167,.08)
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--tx);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* ─── 背景デコレーション ─── */
body::before{
  content:'';
  position:fixed;
  top:-120px;right:-120px;
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(93,175,167,.12) 0%,transparent 70%);
  pointer-events:none;
}
body::after{
  content:'';
  position:fixed;
  bottom:-100px;left:-100px;
  width:350px;height:350px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(82,201,151,.10) 0%,transparent 70%);
  pointer-events:none;
}

/* ─── カード ─── */
.card{
  background:var(--bg2);
  border:1px solid var(--bd);
  border-radius:20px;
  padding:48px 44px 40px;
  width:100%;
  max-width:420px;
  box-shadow:0 8px 40px rgba(93,175,167,.12);
  position:relative;
  z-index:1;
}

/* ─── ロゴ ─── */
.logo{text-align:center;margin-bottom:32px}
.logo-mark{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:56px;height:56px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--pr),var(--pr2));
  margin-bottom:14px;
  box-shadow:0 4px 16px rgba(93,175,167,.35);
}
.logo-mark span{font-size:26px}
.logo-title{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:4px}
.logo-sub{font-size:12px;color:var(--tx3);letter-spacing:.5px}

/* ─── フォーム ─── */
.form-group{margin-bottom:18px}
.form-label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--tx2);
  margin-bottom:7px;
  letter-spacing:.3px;
}
.inp{
  width:100%;
  background:var(--bg3);
  border:1px solid var(--bd);
  border-radius:10px;
  padding:12px 14px;
  font-size:14px;
  color:var(--tx);
  font-family:'Noto Sans JP',sans-serif;
  outline:none;
  transition:all .2s;
}
.inp:focus{
  border-color:var(--pr);
  background:var(--bg2);
  box-shadow:0 0 0 3px var(--pr-light);
}
.inp::placeholder{color:var(--tx3)}

/* ─── ボタン ─── */
.btn{
  width:100%;
  padding:13px;
  border-radius:10px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  border:none;
  transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.btn-p{
  background:var(--pr);
  color:#fff;
  box-shadow:0 4px 14px rgba(93,175,167,.3);
  margin-bottom:12px;
}
.btn-p:hover:not(:disabled){
  background:var(--pr2);
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(93,175,167,.4);
}
.btn-p:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-g{
  background:var(--bg2);
  color:var(--tx2);
  border:1.5px solid var(--bd);
}
.btn-g:hover{border-color:var(--bd2);background:var(--bg3)}

/* ─── 区切り ─── */
.divider{
  display:flex;
  align-items:center;
  gap:12px;
  margin:20px 0;
  color:var(--tx3);
  font-size:12px;
}
.divider::before,.divider::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--bd);
}

/* ─── エラー / 成功 ─── */
.alert{
  display:none;
  padding:11px 14px;
  border-radius:10px;
  font-size:13px;
  margin-bottom:16px;
  font-weight:500;
}
.alert.err{background:var(--rd-light);color:var(--rd);border:1px solid rgba(232,113,113,.2)}
.alert.ok {background:var(--gr-light);color:#2ea87e;border:1px solid rgba(82,201,151,.2)}
.alert.show{display:block}

/* ─── ローディング スピナー ─── */
.spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── フッター ─── */
.card-footer{
  text-align:center;
  margin-top:28px;
  padding-top:20px;
  border-top:1px solid var(--bd);
  font-size:12px;
  color:var(--tx3);
}
</style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="card">

  <!-- ロゴ -->
  <div class="logo">
    <div class="logo-mark"><span>🤝</span></div>
    <div class="logo-title">SocialShift 1on1管理システム</div>
    <div class="logo-sub">1on1 Management Platform</div>
  </div>

  <!-- エラー / 成功メッセージ -->
  <div class="alert err" id="alertErr"></div>
  <div class="alert ok"  id="alertOk"></div>

  <!-- メール / パスワード ログイン -->
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label" for="email">メールアドレス</label>
      <input class="inp" type="email" id="email" name="email"
             placeholder="user@example.com" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">パスワード</label>
      <input class="inp" type="password" id="password" name="password"
             placeholder="8文字以上" autocomplete="current-password" required minlength="8">
    </div>

    <button class="btn btn-p" type="submit" id="loginBtn">
      <span id="btnText">ログイン</span>
      <div class="spinner" id="btnSpinner"></div>
    </button>
  </form>

  <!-- Google OAuth -->
  <p style="text-align:center;font-size:11px;color:var(--tx3);margin:-8px 0 4px">※ Googleログインは現在準備中です</p>
    <div class="divider">または</div>
  <button disabled title="現在準備中です" class="btn btn-g" style="opacity:.45;cursor:not-allowed" onclick="handleGoogleLogin()" id="googleBtn">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
      <path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
    Google アカウントでログイン
  </button>

  <div class="card-footer">
    パスワードを忘れた場合は管理者にお問い合わせください
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════════
//  設定値
// ══════════════════════════════════════════════════════════
const GAS_URL     = 'https://script.google.com/macros/s/AKfycbzdwzQYNRRHO5S7Fq1qBE7qYoMEYoJTjqU1MoQivOWxFpzt4w5NcuICTOYROISn6KYpmQ/exec';
const GITHUB_BASE = 'https://koheiumeda-arch.github.io/SS1on1';

// ══════════════════════════════════════════════════════════
//  フロントエンド SHA-256 ハッシュ（セキュリティ強化）
//  パスワードをプレーンテキストで送信しないようにする
// ══════════════════════════════════════════════════════════
async function sha256Hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ══════════════════════════════════════════════════════════
//  認証モジュール（getToken 追加・修正済み）
// ══════════════════════════════════════════════════════════
const Auth = {
  setAuth:    (token, user) => { localStorage.setItem('1on1_token', token); localStorage.setItem('1on1_user', JSON.stringify(user)); },
  getToken:   () => localStorage.getItem('1on1_token'),
  isLoggedIn: () => !!localStorage.getItem('1on1_token'),
  getUser:    () => { try { return JSON.parse(localStorage.getItem('1on1_user') || 'null'); } catch { return null; } },
};

// ══════════════════════════════════════════════════════════
//  初期化（既にログイン済みなら各画面にリダイレクト）
// ══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  if (Auth.isLoggedIn()) {
    redirectByRole(Auth.getUser(), Auth.getToken());
  }
});

// ══════════════════════════════════════════════════════════
//  ロール別リダイレクト
// ══════════════════════════════════════════════════════════
function decodeJwtRole(token) {
  try {
    const b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(atob(b64)).role || null;
  } catch { return null; }
}

function redirectByRole(user, token) {
  let role = user?.role;
  if (!role && token) {
    role = decodeJwtRole(token);
    if (role && user) {
      user.role = role;
      localStorage.setItem('1on1_user', JSON.stringify(user));
    }
  }
  const roleMap = {
    admin:  GITHUB_BASE + '/admin.html',
    mentor: GITHUB_BASE + '/mentor.html',
    mentee: GITHUB_BASE + '/mentee.html',
  };
  window.location.href = roleMap[role] || (GITHUB_BASE + '/mentee.html');
}

// ══════════════════════════════════════════════════════════
//  UI ヘルパー
// ══════════════════════════════════════════════════════════
function showErr(msg) {
  const el = document.getElementById('alertErr');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('alertOk').classList.remove('show');
}
function showOk(msg) {
  const el = document.getElementById('alertOk');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('alertErr').classList.remove('show');
}
function clearAlert() {
  document.getElementById('alertErr').classList.remove('show');
  document.getElementById('alertOk').classList.remove('show');
}
function setLoading(loading) {
  const btn     = document.getElementById('loginBtn');
  const text    = document.getElementById('btnText');
  const spinner = document.getElementById('btnSpinner');
  btn.disabled          = loading;
  text.textContent      = loading ? '確認中…' : 'ログイン';
  spinner.style.display = loading ? 'block' : 'none';
}

// ══════════════════════════════════════════════════════════
//  メール / パスワード ログイン
//  ★ セキュリティ強化: フロントでSHA-256ハッシュ化してから送信
// ══════════════════════════════════════════════════════════
async function handleLogin(e) {
  e.preventDefault();
  clearAlert();

  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;

  if (!email || !password) { showErr('メールアドレスとパスワードを入力してください'); return; }

  setLoading(true);
  try {
    // フロントでSHA-256ハッシュ化（プレーンテキスト送信を防止）
    const passwordHash = await sha256Hex(password);

    const payload = { path: 'auth/login', _method: 'POST', email, password_hash: passwordHash };
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body:   JSON.stringify(payload),
    });

    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { data = {}; }

    if (data.error) {
      const msgMap = {
        USER_NOT_FOUND:              'メールアドレスまたはパスワードが正しくありません',
        INVALID_PASSWORD:            'メールアドレスまたはパスワードが正しくありません',
        EMAIL_AND_PASSWORD_REQUIRED: 'メールアドレスとパスワードを入力してください',
        USER_DELETED:                'このアカウントは無効です',
        TOO_MANY_ATTEMPTS:           'ログイン試行回数が上限を超えました。5分後に再試行してください',
        INVALID_EMAIL_FORMAT:        'メールアドレスの形式が正しくありません',
      };
      showErr(msgMap[data.error] || `ログインに失敗しました: ${data.error}`);
      return;
    }

    if (!data.token || !data.user) { showErr('サーバーからの応答が不正です'); return; }

    Auth.setAuth(data.token, data.user);
    showOk(`ログイン成功！${data.user.name} さん、ようこそ`);
    setTimeout(() => redirectByRole(data.user, data.token), 800);

  } catch (err) {
    showErr('通信エラーが発生しました。接続を確認してください。');
  } finally {
    setLoading(false);
  }
}

// ══════════════════════════════════════════════════════════
//  Google OAuth ログイン（現在準備中）
// ══════════════════════════════════════════════════════════
function handleGoogleLogin() {
  showErr('Google ログインは現在準備中です。メールアドレスとパスワードでログインしてください。');
}
</script>
</body>
</html>
